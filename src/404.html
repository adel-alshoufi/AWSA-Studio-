<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./responsive.css">
    <title>404 — Page Not Found | AWSA Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'General Sans', sans-serif;
            overflow: hidden;
        }

        /* ── header ── */
        .p404-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .p404-logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: transparent;
            -webkit-text-stroke: 2px #fff;
            font-family: 'General Sans', 'Arial Narrow Bold', sans-serif;
            text-decoration: none;
        }

        .p404-back {
            background: none;
            border: 1px solid #ffffff40;
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.25s, border-color 0.25s;
        }

        .p404-back:hover {
            background: #107c79;
            border-color: #107c79;
        }

        /* ── main stage ── */
        .p404-stage {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 24px;
            position: relative;
            overflow: hidden;
        }

        /* giant ghost number */
        .p404-ghost {
            position: absolute;
            font-size: clamp(180px, 40vw, 520px);
            font-weight: 900;
            font-family: Impact, 'Arial Narrow Bold', sans-serif;
            color: transparent;
            -webkit-text-stroke: 1px #ffffff12;
            line-height: 1;
            user-select: none;
            pointer-events: none;
            letter-spacing: -0.04em;
        }

        /* teal accent line */
        .p404-accent {
            width: 48px;
            height: 3px;
            background: #107c79;
            border-radius: 2px;
            margin: 0 auto 28px;
        }

        .p404-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #107c79;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .p404-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            font-family: Impact, 'Arial Narrow Bold', sans-serif;
            letter-spacing: 0.02em;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .p404-sub {
            font-size: 15px;
            color: #ffffff80;
            max-width: 380px;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .p404-cta {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 14px 40px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.04em;
            text-decoration: none;
            transition: background 0.25s, color 0.25s;
        }

        .p404-cta:hover {
            background: #107c79;
            color: #fff;
        }

        /* bottom strip */
        .p404-strip {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #ffffff40;
            border-top: 1px solid #ffffff10;
            font-family: Impact, 'Arial Narrow Bold', sans-serif;
            letter-spacing: 0.06em;
        }

        @media (max-width: 639px) {
            .p404-header {
                padding: 16px 20px;
            }

            .p404-strip {
                padding: 14px 20px;
                flex-direction: column;
                gap: 4px;
            }

            .p404-ghost {
                -webkit-text-stroke: 1px #ffffff0a;
            }
        }
    </style>
</head>

<body>
    <script>
        // Show the path the user tried to reach
        (function () {
            var params = new URLSearchParams(window.location.search);
            var from = params.get('from');
            if (from) {
                var sub = document.getElementById('p404-from');
                if (sub) {
                    sub.textContent = 'Tried to reach: ' + decodeURIComponent(from);
                    sub.style.display = 'block';
                }
            }
        }());
    </script>

    <!-- Header -->
    <header class="p404-header">
        <a href="./index.html" class="p404-logo">AWSA</a>
        <a href="./index.html" class="p404-back">← Back to Home</a>
    </header>

    <!-- Main -->
    <main class="p404-stage">
        <!-- ghost number in background -->
        <span class="p404-ghost" aria-hidden="true">404</span>

        <!-- foreground content -->
        <p class="p404-label">Error 404</p>
        <div class="p404-accent"></div>
        <h1 class="p404-title">Page not found</h1>
        <p class="p404-sub">
            Looks like this page took a wrong turn somewhere.
            It may have been moved, deleted, or never existed.
        </p>
        <p id="p404-from"
            style="display:none; font-size:12px; color:#ffffff30; margin-bottom:32px; letter-spacing:0.04em;"></p>
        <a href="./index.html" class="p404-cta">Take me home</a>
    </main>

    <!-- Bottom strip -->
    <footer class="p404-strip">
        <span>© 2026 AWSA STUDIO</span>
        <span>STUDIO BASED IN CALIFORNIA</span>
    </footer>

</body>

</html>
